<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Product Code Picture Checker</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f5f5f5;
      margin: 0;
      padding: 25px;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 4px 15px rgba(0,0,0,0.1);
    }

    h1 {
      margin-top: 0;
    }

    .message {
      margin-top: 15px;
      padding: 12px;
      border-radius: 8px;
      background: #f0f0f0;
      font-weight: bold;
    }

    input {
      font-size: 16px;
      box-sizing: border-box;
      border-radius: 6px;
      border: 1px solid #ccc;
      padding: 9px;
    }

    .search-box {
      width: 100%;
      padding: 12px;
      margin-top: 20px;
      margin-bottom: 10px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 15px;
      background: white;
    }

    th, td {
      border: 1px solid #ccc;
      padding: 10px;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #eeeeee;
    }

    .code-input {
      width: 100%;
    }

    .product-img {
      display: none;
      max-width: 120px;
      max-height: 100px;
      border-radius: 8px;
      border: 1px solid #ddd;
      object-fit: cover;
    }

    .status {
      font-size: 13px;
      color: #555;
      margin-top: 5px;
    }

    .wrong {
      color: #b00020;
      font-weight: bold;
    }

    .correct {
      color: #1f7a3f;
      font-weight: bold;
    }

    @media (max-width: 700px) {
      body {
        padding: 10px;
      }

      th, td {
        padding: 7px;
        font-size: 14px;
      }

      .product-img {
        max-width: 90px;
        max-height: 80px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Product Code Picture Checker</h1>

    <div id="message" class="message">Loading products from Google Sheets...</div>

    <input
      class="search-box"
      type="text"
      id="searchBox"
      placeholder="Search product name..."
      oninput="renderTable()"
    />

    <div id="tableArea"></div>
  </div>

  <script>
    let products = [];

    const GOOGLE_SHEET_CSV_URL = "https://docs.google.com/spreadsheets/d/138CuW3rTC6PzJ2b9zQ33WQP44MtRgCD25FhUeWKN_KI/export?format=csv";

    window.onload = function () {
      loadProductsFromSheet();
    };

    async function loadProductsFromSheet() {
      try {
        showMessage("Loading products from Google Sheets...");

        const response = await fetch(GOOGLE_SHEET_CSV_URL);

        if (!response.ok) {
          throw new Error("Could not load Google Sheet. Make sure the sheet is shared as Anyone with the link can view.");
        }

        const csvText = await response.text();
        products = parseCSV(csvText);

        if (products.length === 0) {
          showMessage("No products found. Make sure Column A has product names and Column B has codes.");
          return;
        }

        renderTable();
        showMessage(products.length + " products loaded from Google Sheets.");
      } catch (error) {
        console.error(error);
        showMessage("Error loading products. Check that your Google Sheet is public and Column A = product name, Column B = code.");
      }
    }

    function parseCSV(csvText) {
      const rows = csvText.trim().split(/\r?\n/);
      const productList = [];

      rows.forEach((row, index) => {
        const columns = splitCSVRow(row);

        if (columns.length < 2) return;

        let name = columns[0].trim();
        let code = columns[1].trim();

        // Skip header row if your sheet starts with Name / Code / PLU
        if (index === 0) {
          const firstCell = name.toLowerCase();
          const secondCell = code.toLowerCase();

          if (
            firstCell.includes("name") ||
            firstCell.includes("item") ||
            firstCell.includes("product") ||
            secondCell.includes("code") ||
            secondCell.includes("plu")
          ) {
            return;
          }
        }

        if (name && code) {
          productList.push({
            id: makeId(name, index),
            name: name,
            code: code,
            imageUrl: "",
            imageLoaded: false
          });
        }
      });

      return productList;
    }

    function splitCSVRow(row) {
      const result = [];
      let current = "";
      let insideQuotes = false;

      for (let i = 0; i < row.length; i++) {
        const char = row[i];
        const nextChar = row[i + 1];

        if (char === '"' && insideQuotes && nextChar === '"') {
          current += '"';
          i++;
        } else if (char === '"') {
          insideQuotes = !insideQuotes;
        } else if (char === "," && !insideQuotes) {
          result.push(current);
          current = "";
        } else {
          current += char;
        }
      }

      result.push(current);
      return result;
    }

    function makeId(text, index) {
      return text.toLowerCase().replace(/[^a-z0-9]+/g, "-").replace(/(^-|-$)/g, "") + "-" + index;
    }

    function renderTable() {
      const tableArea = document.getElementById("tableArea");
      const searchText = document.getElementById("searchBox").value.trim().toLowerCase();

      const filteredProducts = products.filter(product =>
        product.name.toLowerCase().includes(searchText)
      );

      if (filteredProducts.length === 0) {
        tableArea.innerHTML = "<p>No products to show.</p>";
        return;
      }

      let html = `
        <table>
          <thead>
            <tr>
              <th style="width: 40%;">Product Name</th>
              <th style="width: 25%;">Enter Code</th>
              <th style="width: 35%;">Picture</th>
            </tr>
          </thead>
          <tbody>
      `;

      filteredProducts.forEach(product => {
        html += `
          <tr>
            <td>${escapeHtml(product.name)}</td>
            <td>
              <input
                class="code-input"
                type="text"
                placeholder="Enter code"
                oninput="checkCode('${product.id}', this.value)"
              />
              <div id="status-${product.id}" class="status"></div>
            </td>
            <td>
              <img id="img-${product.id}" class="product-img" alt="${escapeHtml(product.name)} picture" />
              <div id="source-${product.id}" class="status"></div>
            </td>
          </tr>
        `;
      });

      html += "</tbody></table>";
      tableArea.innerHTML = html;
    }

    async function checkCode(productId, enteredCode) {
      const product = products.find(item => item.id === productId);
      const status = document.getElementById("status-" + productId);
      const img = document.getElementById("img-" + productId);
      const source = document.getElementById("source-" + productId);

      if (!product) return;

      if (!enteredCode.trim()) {
        status.textContent = "";
        status.className = "status";
        img.style.display = "none";
        img.src = "";
        source.textContent = "";
        return;
      }

      if (enteredCode.trim() !== product.code) {
        status.textContent = "Wrong code";
        status.className = "status wrong";
        img.style.display = "none";
        img.src = "";
        source.textContent = "";
        return;
      }

      status.textContent = "Correct. Loading picture...";
      status.className = "status correct";

      if (!product.imageLoaded) {
        product.imageUrl = await findWikimediaImage(product.name);
        product.imageLoaded = true;
      }

      if (product.imageUrl) {
        img.src = product.imageUrl;
        img.style.display = "block";
        source.textContent = "Image from Wikimedia Commons search.";
        status.textContent = "Correct";
      } else {
        img.style.display = "none";
        source.textContent = "No picture found automatically.";
        status.textContent = "Correct, but no picture found.";
      }
    }

    async function findWikimediaImage(searchTerm) {
      try {
        const searchUrl = "https://commons.wikimedia.org/w/api.php?action=query&generator=search&gsrsearch=" +
          encodeURIComponent(searchTerm) +
          "&gsrnamespace=6&gsrlimit=1&prop=imageinfo&iiprop=url&iiurlwidth=500&format=json&origin=*";

        const response = await fetch(searchUrl);
        const data = await response.json();

        if (!data.query || !data.query.pages) return null;

        const pages = Object.values(data.query.pages);
        if (pages.length === 0 || !pages[0].imageinfo || !pages[0].imageinfo[0]) return null;

        return pages[0].imageinfo[0].thumburl || pages[0].imageinfo[0].url;
      } catch (error) {
        console.error(error);
        return null;
      }
    }

    function showMessage(text) {
      document.getElementById("message").textContent = text;
    }

    function escapeHtml(text) {
      const div = document.createElement("div");
      div.textContent = text;
      return div.innerHTML;
    }
  </script>
</body>
</html>
